<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>W컨셉 광고 성과 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap');
  :root{
    --bg-base:#f4f6fb; --bg-card:#ffffff; --bg-card2:#f4f7fc; --bg-hover:#eef3fb;
    --border:#e4e9f2; --border-bright:#cdd7e6;
    --accent:#2563eb; --accent-glow:rgba(37,99,235,0.18); --accent2:#6366f1;
    --green:#059669; --green-dim:rgba(5,150,105,0.12);
    --red:#dc2626; --red-dim:rgba(220,38,38,0.10);
    --yellow:#d97706; --yellow-dim:rgba(217,119,6,0.12);
    --purple:#7c3aed; --pink:#db2777;
    --text-1:#0f172a; --text-2:#475569; --text-3:#94a3b8;
    --radius:14px; --radius-sm:9px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg-base);
    color:var(--text-1);min-height:100vh;font-size:14px;line-height:1.5;
    background-image:radial-gradient(900px 400px at 80% -10%,rgba(37,99,235,0.06),transparent),
                     radial-gradient(700px 350px at 0% 0%,rgba(124,58,237,0.05),transparent);}
  .wrap{max-width:1800px;margin:0 auto;padding:0 24px 60px;}
  .header{display:flex;align-items:center;justify-content:space-between;
    padding:18px 24px;border-bottom:1px solid var(--border);
    background:rgba(255,255,255,0.85);position:sticky;top:0;z-index:100;
    backdrop-filter:blur(12px);margin-bottom:22px;box-shadow:0 1px 0 rgba(15,23,42,0.04);}
  .h-left{display:flex;align-items:center;gap:14px;}
  .logo{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,var(--accent),var(--accent2));font-weight:800;color:#fff;
    box-shadow:0 0 18px var(--accent-glow);font-size:13px;}
  .h-title{font-size:17px;font-weight:700;}
  .h-sub{font-size:11px;color:var(--text-3);margin-top:2px;}
  .live{display:flex;align-items:center;gap:7px;background:var(--green-dim);
    border:1px solid rgba(5,150,105,0.3);border-radius:20px;padding:5px 13px;
    font-size:11px;color:var(--green);font-weight:600;}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.6s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .tabs{display:flex;gap:4px;margin-bottom:18px;border-bottom:1px solid var(--border);}
  .tabs button{padding:11px 22px;border:none;background:transparent;color:var(--text-2);font-size:14px;
    font-weight:700;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-1px;transition:.15s;}
  .tabs button:hover{color:var(--text-1);}
  .tabs button.on{color:var(--accent);border-bottom-color:var(--accent);}
  .donut-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;}
  @media(max-width:900px){.donut-grid{grid-template-columns:repeat(2,1fr);}}
  .donut-card{background:var(--bg-card2);border:1px solid var(--border);border-radius:12px;padding:14px;}
  .donut-t{font-size:13px;font-weight:700;margin-bottom:8px;text-align:center;}
  .donut-box{position:relative;height:250px;}
  .fpanel{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
    padding:14px 18px;margin-bottom:20px;box-shadow:0 1px 3px rgba(15,23,42,0.04);}
  .frow{display:flex;align-items:center;gap:10px;padding:6px 0;flex-wrap:wrap;}
  .frow + .frow{border-top:1px solid var(--border);}
  .flabel{font-size:11.5px;color:var(--text-2);font-weight:700;width:78px;flex-shrink:0;letter-spacing:.02em;}
  .seg{display:flex;gap:4px;flex-wrap:wrap;}
  .seg button{padding:6px 13px;border:1px solid var(--border-bright);background:transparent;color:var(--text-2);
    font-size:12.5px;font-weight:600;border-radius:7px;cursor:pointer;font-family:inherit;transition:.15s;}
  .seg button:hover{border-color:var(--accent);color:var(--accent);}
  .seg button.on{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 0 12px var(--accent-glow);}
  .dpick{display:flex;align-items:center;gap:6px;margin-left:4px;}
  .dpick input[type=date]{background:var(--bg-base);border:1px solid var(--border-bright);border-radius:7px;
    color:var(--text-1);padding:5px 9px;font-size:12.5px;font-family:inherit;outline:none;cursor:pointer;}
  .dpick input[type=date]:focus{border-color:var(--accent);}
  .dpick .tilde{color:var(--text-3);font-weight:700;}
  .rangetag{font-size:11.5px;color:var(--accent);font-weight:700;background:var(--accent-glow);
    border-radius:6px;padding:3px 9px;margin-left:2px;}
  .ftools{display:flex;align-items:center;gap:10px;margin-bottom:22px;flex-wrap:wrap;}
  .reset{padding:6px 13px;border:1px solid var(--border-bright);background:transparent;color:var(--text-2);
    font-size:12px;font-weight:600;border-radius:7px;cursor:pointer;font-family:inherit;}
  .reset:hover{border-color:var(--red);color:var(--red);}
  .selsum{font-size:12px;color:var(--text-3);}
  .selsum b{color:var(--accent);font-weight:700;}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
  .kpi{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
    padding:16px 18px;position:relative;overflow:hidden;transition:.2s;box-shadow:0 1px 3px rgba(15,23,42,0.04);}
  .kpi:hover{border-color:var(--border-bright);transform:translateY(-2px);box-shadow:0 6px 18px rgba(15,23,42,0.08);}
  .kpi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);opacity:.7;}
  .kpi.k-rev::before{background:var(--green);} .kpi.k-roas::before{background:var(--yellow);}
  .kpi.k-cost::before{background:var(--accent);} .kpi.k-cpa::before{background:var(--purple);}
  .kpi .lab{font-size:11.5px;color:var(--text-2);font-weight:600;margin-bottom:8px;}
  .kpi .val{font-size:22px;font-weight:800;letter-spacing:-.02em;}
  .kpi .kpi-sub{font-size:11.5px;font-weight:500;color:var(--text-3);margin-left:8px;letter-spacing:0;vertical-align:middle;}
  .kpi .delta{font-size:12px;font-weight:700;margin-top:7px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .kpi .delta .dlab{color:var(--text-3);font-weight:600;}
  .kpi .delta .dsep{color:var(--border-bright);font-weight:400;}
  .up{color:var(--green);} .down{color:var(--red);} .flat{color:var(--text-3);}
  .card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
    padding:20px;margin-bottom:22px;box-shadow:0 1px 3px rgba(15,23,42,0.04);}
  .card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap;}
  .card-t{font-size:15px;font-weight:700;display:flex;align-items:center;gap:9px;}
  .card-t .bar{width:4px;height:16px;border-radius:2px;background:var(--accent);}
  .card-sub{font-size:11px;color:var(--text-3);font-weight:500;}
  .chart-box{position:relative;height:330px;}
  .grid2{display:grid;grid-template-columns:1.15fr 1fr;gap:22px;align-items:start;}
  @media(max-width:1000px){.grid2{grid-template-columns:1fr;}.kpis{grid-template-columns:repeat(2,1fr);}}
  .tbl-wrap{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:13px;white-space:nowrap;}
  th{text-align:right;padding:10px 12px;color:var(--text-2);font-weight:600;font-size:11.5px;
    border-bottom:1px solid var(--border-bright);cursor:pointer;user-select:none;letter-spacing:.02em;}
  th:first-child,td:first-child{text-align:left;}
  th.sortable:hover{color:var(--text-1);}
  th .arr{opacity:.4;font-size:9px;margin-left:3px;}
  th.act .arr{opacity:1;color:var(--accent);}
  td{padding:11px 12px;border-bottom:1px solid var(--border);}
  tbody tr:hover{background:var(--bg-card2);}
  .gtag{display:inline-flex;align-items:center;font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:5px;margin-right:4px;}
  .lft{text-align:left!important;}
  .rank{color:var(--text-3);font-weight:700;font-size:12px;}
  .morebtn{margin-top:12px;text-align:center;}
  .morebtn button{padding:7px 18px;border:1px solid var(--border-bright);background:transparent;color:var(--text-2);
    font-size:12.5px;font-weight:600;border-radius:8px;cursor:pointer;font-family:inherit;transition:.15s;}
  .morebtn button:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-glow);}
  .cname{max-width:330px;overflow:hidden;text-overflow:ellipsis;display:inline-block;vertical-align:middle;}
  .chl{color:var(--text-3);font-size:11px;}
  .roas-good{color:var(--green);font-weight:700;} .roas-mid{color:var(--yellow);font-weight:700;} .roas-bad{color:var(--red);font-weight:700;}
  .muted{color:var(--text-3);}
  .search{background:var(--bg-base);border:1px solid var(--border-bright);border-radius:8px;
    color:var(--text-1);padding:7px 12px;font-size:12.5px;font-family:inherit;outline:none;width:240px;}
  .search:focus{border-color:var(--accent);}
  .note{font-size:11.5px;color:var(--text-3);background:var(--bg-card2);border:1px solid var(--border);
    border-radius:9px;padding:10px 14px;margin-bottom:22px;display:flex;gap:8px;align-items:flex-start;}
  .note b{color:var(--yellow);}
  .foot{text-align:center;color:var(--text-3);font-size:11px;margin-top:30px;}
  .barmini{height:6px;border-radius:3px;background:var(--border);overflow:hidden;min-width:54px;display:inline-block;vertical-align:middle;}
  .barmini>i{display:block;height:100%;border-radius:3px;}
</style>
</head>
<body>
<div class="header">
  <div class="h-left">
    <div class="logo">지원</div>
    <div>
      <div class="h-title">광고 성과 대시보드</div>
      <div class="h-sub" id="period">불러오는 중…</div>
    </div>
  </div>
  <div class="live"><span class="dot"></span><span id="updated">LIVE</span></div>
</div>

<div class="wrap">
  <div class="tabs">
    <button data-tab="perf" class="on">광고 성과</button>
    <button data-tab="budget">광고비용 편성</button>
  </div>

  <div class="fpanel" id="fpanel"></div>
  <div class="ftools">
    <button class="reset" id="resetBtn">↺ 필터 초기화</button>
    <span class="selsum" id="selsum"></span>
  </div>

 <div id="tab1">
  <div id="cmpNote" style="font-size:11.5px;color:var(--text-3);margin:-4px 2px 12px;"></div>
  <div class="kpis" id="kpis"></div>

  <div class="card">
    <div class="card-h">
      <div class="card-t"><span class="bar"></span>일별 추이</div>
      <div class="seg" id="metricSeg">
        <button data-m="money" class="on">광고비 · 매출 · ROAS</button>
        <button data-m="conv">설치 · 가입 · 첫구매</button>
      </div>
    </div>
    <div class="chart-box"><canvas id="trendChart"></canvas></div>
  </div>

  <div class="grid2">
    <div class="card">
      <div class="card-h"><div class="card-t"><span class="bar"></span>매체별 비용 · ROAS</div>
        <span class="card-sub" id="mediaSub"></span></div>
      <div class="chart-box" style="height:360px"><canvas id="mediaChart"></canvas></div>
    </div>
    <div class="card">
      <div class="card-h"><div class="card-t"><span class="bar"></span>매체 성과</div>
        <span class="card-sub">클릭 시 정렬</span></div>
      <div class="tbl-wrap"><table id="mediaTbl"></table></div>
      <div class="morebtn" id="mediaMore"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-h">
      <div class="card-t"><span class="bar"></span>캠페인별 상세</div>
      <input class="search" id="campSearch" placeholder="캠페인 검색…">
    </div>
    <div class="tbl-wrap"><table id="campTbl"></table></div>
    <div class="morebtn" id="campMore"></div>
  </div>

  <div class="card">
    <div class="card-h">
      <div class="card-t"><span class="bar"></span>소재 성과 <span class="card-sub" style="font-weight:500;margin-left:6px;">SA(검색)는 소재 구분이 없어 DA만 표시</span></div>
      <input class="search" id="sojaeSearch" placeholder="소재 검색…">
    </div>
    <div class="tbl-wrap"><table id="sojaeTbl"></table></div>
    <div class="morebtn" id="sojaeMore"></div>
  </div>
 </div><!-- /tab1 -->

 <div id="tab2" style="display:none">
  <div class="card">
    <div class="card-h"><div class="card-t"><span class="bar"></span>구분자별 광고비 편성 비율</div>
      <span class="card-sub" id="budgetSub"></span></div>
    <div class="donut-grid">
      <div class="donut-card"><div class="donut-t">대표사업부</div><div class="donut-box"><canvas id="dn_s"></canvas></div></div>
      <div class="donut-card"><div class="donut-t">광고구분 (DA / SA)</div><div class="donut-box"><canvas id="dn_g"></canvas></div></div>
      <div class="donut-card"><div class="donut-t">목표1</div><div class="donut-box"><canvas id="dn_o1"></canvas></div></div>
      <div class="donut-card"><div class="donut-t">광고유형 — DA 내</div><div class="donut-box"><canvas id="dn_tDA"></canvas></div></div>
      <div class="donut-card"><div class="donut-t">광고유형 — SA 내</div><div class="donut-box"><canvas id="dn_tSA"></canvas></div></div>
      <div class="donut-card"><div class="donut-t">목표2</div><div class="donut-box"><canvas id="dn_o2"></canvas></div></div>
    </div>
  </div>

  <div class="card">
    <div class="card-h"><div class="card-t"><span class="bar"></span>DA / SA 매체별 광고비 비중</div>
      <span class="card-sub">작은 매체는 ‘기타’로 합산</span></div>
    <div class="donut-grid" style="grid-template-columns:repeat(2,1fr)">
      <div class="donut-card"><div class="donut-t">DA 매체 비중</div><div class="donut-box" style="height:300px"><canvas id="dn_mediaDA"></canvas></div></div>
      <div class="donut-card"><div class="donut-t">SA 매체 비중</div><div class="donut-box" style="height:300px"><canvas id="dn_mediaSA"></canvas></div></div>
    </div>
  </div>
  <div class="card">
    <div class="card-h">
      <div class="card-t"><span class="bar"></span>기획전별 광고비 순위</div>
      <input class="search" id="promoSearch" placeholder="기획전 검색…">
    </div>
    <div class="tbl-wrap"><table id="promoTbl"></table></div>
    <div class="morebtn" id="promoMore"></div>
  </div>
 </div><!-- /tab2 -->

  <div class="note"><span>ℹ️</span><div id="costNote"></div></div>
  <div class="foot" id="foot"></div>
</div>

<script>
const F={ won:v=>v==null?'—':'₩'+Math.round(v).toLocaleString('ko-KR'),
  num:v=>v==null?'—':Math.round(v).toLocaleString('ko-KR'), pct:v=>v==null?'—':v.toFixed(0)+'%' };
// 금액 압축 표기(억/만) — 표·KPI 칸 정렬용
const WC=v=>{ if(v==null)return'—'; const a=Math.abs(v);
  if(a>=1e8)return (v/1e8).toFixed(1)+'억';
  if(a>=1e4)return Math.round(v/1e4).toLocaleString('ko-KR')+'만';
  return Math.round(v).toLocaleString('ko-KR'); };
// 캠페인명 보정(요약/미지정 행 라벨)
const campLabel=c=>(!c||c==='-'||c==='(미지정)')?'(캠페인 미지정 · 매체 보고분)':c;
const DIMS=['s','g','t','o1','o2'];
const DIMKEY={s:'daehyo',g:'gubun',t:'yuhyeong',o1:'mokpyo1',o2:'mokpyo2'};
const M=['c','ins','su','rv','fo','uv','auv'];
let DATA, minDate, maxDate, selMin;
let state={ start:null, end:null, preset:7, metric:'money',
  f:{s:'전체',g:'전체',t:'전체',o1:'전체',o2:'전체'},
  campSort:{key:'c',dir:-1}, mediaSort:{key:'c',dir:-1}, sojaeSort:{key:'rv',dir:-1}, promoSort:{key:'c',dir:-1},
  search:'', sojaeSearch:'', promoSearch:'', campExpanded:false, mediaExpanded:false, sojaeExpanded:false, promoExpanded:false, tab:'perf' };
let trendChart, mediaChart;

// 날짜 유틸 (문자열 yyyy-mm-dd 비교 = 시간순)
function addDays(ds,n){ const [y,m,d]=ds.split('-').map(Number); const dt=new Date(Date.UTC(y,m-1,d));
  dt.setUTCDate(dt.getUTCDate()+n); return dt.toISOString().slice(0,10); }
function shiftYear(ds,n){ const [y,m,d]=ds.split('-').map(Number); const dt=new Date(Date.UTC(y+n,m-1,d));
  return dt.toISOString().slice(0,10); }
function dayspan(a,b){ return Math.round((new Date(a+'T00:00:00Z')-0-(new Date(b+'T00:00:00Z')-0))/-86400000)+1; }
const md = ds => ds.slice(5).replace('-','/');

const emptyAgg=()=>{const o={};M.forEach(k=>o[k]=0);return o;};
const add=(a,r)=>{M.forEach(k=>a[k]+=(r[k]||0));return a;};
const derive=a=>({...a, roas:a.c>0?a.rv/a.c*100:null, cpaSu:a.c>0&&a.su>0?a.c/a.su:null,
  cpaFo:a.c>0&&a.fo>0?a.c/a.fo:null, cpi:a.c>0&&a.ins>0?a.c/a.ins:null,
  cpUV:a.c>0&&a.uv>0?a.c/a.uv:null, appCpUV:a.c>0&&a.auv>0?a.c/a.auv:null });
const roasClass=v=>v==null?'muted':(v>=1000?'roas-good':v>=400?'roas-mid':'roas-bad');
const roasCell=v=>`<td class="${roasClass(v)}">${v==null?'<span class=muted>—</span>':v.toFixed(0)+'%'}</td>`;
const matchF=r=>DIMS.every(d=>state.f[d]==='전체'||r[d]===state.f[d]);

const inDaily=()=>DATA.daily.filter(r=>r.dt>=state.start&&r.dt<=state.end&&matchF(r)); // KPI/추이(YoY밴드 포함)
const inRows=()=>DATA.rows.filter(r=>r.dt>=state.start&&r.dt<=state.end&&matchF(r));   // 매체/캠페인/소재 표(올해)
function prevRange(){
  const len=dayspan(state.start,state.end);
  const pe=addDays(state.start,-1), ps=addDays(pe,-(len-1));
  if(ps<selMin) return null;               // 직전 기간이 현재 밴드 시작 이전이면 비교 안 함
  const r=DATA.daily.filter(x=>x.dt>=ps&&x.dt<=pe&&matchF(x));
  return r.length?{rows:r,ps,pe}:null;
}
function yoyRange(){                         // 전년 동기(YoY)
  const ys=shiftYear(state.start,-1), ye=shiftYear(state.end,-1);
  const r=DATA.daily.filter(x=>x.dt>=ys&&x.dt<=ye&&matchF(x));
  return r.length?{rows:r,ys,ye}:null;
}

function deltaSeg(curV,cmpV,inv,ppt,label,title){
  if(cmpV==null||curV==null||(!ppt&&cmpV===0))
    return `<span class="flat" title="${title}"><span class="dlab">${label}</span> <span class="muted">–</span></span>`;
  let val,txt;
  if(ppt){ val=curV-cmpV; txt=(val>0?'+':'')+val.toFixed(0)+'%p'; }
  else { val=(curV-cmpV)/cmpV*100; txt=(val>0?'+':'')+val.toFixed(0)+'%'; }
  const good=inv?val<0:val>0; const cls=Math.abs(val)<0.5?'flat':(good?'up':'down');
  const ar=val>0?'▲':val<0?'▼':'–';
  return `<span class="${cls}" title="${title}"><span class="dlab">${label}</span> ${ar}${txt}</span>`;
}
function renderKPIs(){
  const cur=derive(inDaily().reduce(add,emptyAgg()));
  const pv=prevRange(); const prev=pv?derive(pv.rows.reduce(add,emptyAgg())):null;
  const yv=yoyRange(); const yoy=yv?derive(yv.rows.reduce(add,emptyAgg())):null;
  const yoyT=yv?`전년 동기 ${yv.ys} ~ ${yv.ye} 대비`:'전년 동기 데이터 없음';

    {cls:'',lab:'가입',f:F.num,get:o=>o.su},

    {cls:'k-cpa',lab:'첫구매 CPA',f:F.won,get:o=>o.cpaFo,inv:true},
  ];

  }).join('');
}

const PAL=['#2563eb','#7c3aed','#db2777','#d97706','#059669','#0ea5e9','#64748b','#f43f5e'];
let donuts={};
function budgetAgg(dim,gf){
  const by={};
  inRows().forEach(r=>{ if(gf&&r.g!==gf)return; const k=r[dim]; if(!k)return; by[k]=(by[k]||0)+r.c; });
  return Object.entries(by).filter(e=>e[1]>0).sort((a,b)=>b[1]-a[1]);
}
// saLabel: SA가 전부 속하는 라벨(상시/Sales/구매). 그 라벨에만 (SA제외 = 라벨% - SA비중%) 병기
function renderDonut(id,entries,saLabel,saCost){
  const ctx=document.getElementById(id); if(!ctx)return;
  if(donuts[id]){donuts[id].destroy();donuts[id]=null;}
  const total=entries.reduce((a,e)=>a+e[1],0);
  if(!total) return;
  const exTxt=(l,v)=>(saLabel&&l===saLabel&&saCost>0)?` (SA제외 ${((v-saCost)/total*100).toFixed(0)}%)`:'';
  donuts[id]=new Chart(ctx,{type:'doughnut',plugins:[ChartDataLabels],data:{labels:entries.map(e=>e[0]),
    datasets:[{data:entries.map(e=>e[1]),backgroundColor:entries.map((_,i)=>PAL[i%PAL.length]),borderWidth:2,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'54%',layout:{padding:6},
      plugins:{legend:{position:'bottom',labels:{color:'#475569',font:{size:11},boxWidth:10,padding:6,
        generateLabels:ch=>ch.data.labels.map((l,i)=>{const v=ch.data.datasets[0].data[i];const p=total?v/total*100:0;
          return {text:`${l} ${p.toFixed(0)}%`+exTxt(l,v),fillStyle:PAL[i%PAL.length],strokeStyle:PAL[i%PAL.length],index:i};})}},
        tooltip:{callbacks:{
          label:c=>{const p=total?(c.parsed/total*100).toFixed(1):0;return ` ${c.label}: ${WC(c.parsed)} (${p}%)`+exTxt(c.label,c.parsed);},
          afterLabel:c=>{const e=entries[c.dataIndex]; if(e&&e[2]&&e[2].length) return e[2].map(x=>`   · ${x[0]} ${WC(x[1])} (${total?(x[1]/total*100).toFixed(1):0}%)`); return undefined;}
        }},
        datalabels:{color:'#fff',font:{weight:'700',size:11},textAlign:'center',
          formatter:(val,ctx)=>{const p=total?val/total*100:0; return p>=7?ctx.chart.data.labels[ctx.dataIndex]+'\n'+p.toFixed(0)+'%':'';}}
      }}});
}
function saCostNow(){ let s=0; inRows().forEach(r=>{if(r.g==='SA')s+=r.c;}); return s; }
function groupSmall(entries,thr){
  const total=entries.reduce((a,e)=>a+e[1],0); if(!total) return entries;
  const big=[]; const etcList=[]; let etc=0;
  entries.forEach(e=>{ if(e[1]/total*100>=thr) big.push(e); else {etc+=e[1]; etcList.push(e);} });
  if(etc>0) big.push(['기타',etc,etcList]); // 3번째: 기타 구성 매체 목록
  return big;
}
function renderBudget(){
  const saC=saCostNow();
  renderDonut('dn_s',budgetAgg('s'),'상시',saC);
  renderDonut('dn_g',budgetAgg('g'));
  renderDonut('dn_o1',budgetAgg('o1'),'Sales',saC);
  renderDonut('dn_tDA',budgetAgg('t','DA'));
  renderDonut('dn_tSA',budgetAgg('t','SA'));
  renderDonut('dn_o2',budgetAgg('o2'),'구매',saC);
  renderDonut('dn_mediaDA',groupSmall(budgetAgg('media','DA'),3));
  renderDonut('dn_mediaSA',groupSmall(budgetAgg('media','SA'),3));
  safe('PromoTbl',renderPromoTbl);
  const sub=document.getElementById('budgetSub'); if(sub)sub.textContent=`${state.start} ~ ${state.end} · 광고비 기준`;
}
function refresh(){ if(state.tab==='budget') renderBudget(); else renderAll(); }
function switchTab(t){ state.tab=t;
  document.getElementById('tab1').style.display=(t==='perf')?'':'none';
  document.getElementById('tab2').style.display=(t==='budget')?'':'none';
  document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('on',b.dataset.tab===t));
  refresh();
}

function safe(name,fn){ try{ fn(); }catch(e){ console.error('['+name+'] 렌더 오류:',e); } }
function renderAll(){
  safe('KPI',renderKPIs); safe('Trend',renderTrend); safe('MediaChart',renderMediaChart);
  safe('MediaTbl',renderMediaTbl); safe('CampTbl',renderCampTbl); safe('SojaeTbl',renderSojaeTbl);
  const d=document.getElementById('mediaSub'); if(d)d.textContent=`${state.start} ~ ${state.end}`;
}

// 기간 적용
function applyPreset(n){ state.preset=n; state.end=maxDate; state.start=addDays(maxDate,-(n-1));
  if(state.start<selMin)state.start=selMin; syncDateUI(); refresh(); }
function applyCustom(){ state.preset=null;
  const si=document.getElementById('dStart'), ei=document.getElementById('dEnd');
  let s=si.value, e=ei.value; if(!s||!e)return;
  if(s>e){[s,e]=[e,s];} state.start=s; state.end=e; syncDateUI(); refresh(); }
function syncDateUI(){
  document.getElementById('dStart').value=state.start;
  document.getElementById('dEnd').value=state.end;
  document.querySelectorAll('.seg[data-dim="preset"] button').forEach(b=>b.classList.toggle('on',+b.dataset.v===state.preset));
  const days=dayspan(state.start,state.end);
  document.getElementById('rangeTag').textContent=`${state.start} ~ ${state.end} · ${days}일`;
}

function renderFilters(){
  const L=DATA.meta.dimLabels;
  let html=`<div class="frow"><span class="flabel">기간</span>
    <div class="seg" data-dim="preset">${[[1,'전일'],[7,'최근 7일'],[14,'최근 14일'],[30,'최근 30일']].map(([r,l])=>`<button data-v="${r}">${l}</button>`).join('')}</div>
    <div class="dpick">
      <input type="date" id="dStart" min="${selMin}" max="${maxDate}">
      <span class="tilde">~</span>
      <input type="date" id="dEnd" min="${selMin}" max="${maxDate}">
    </div>
    <span class="rangetag" id="rangeTag"></span></div>`;
  DIMS.forEach(d=>{
    const vals=DATA.dims[DIMKEY[d]]||[];
    html+=`<div class="frow"><span class="flabel">${L[d]}</span><div class="seg" data-dim="${d}">
      <button data-v="전체" class="${state.f[d]==='전체'?'on':''}">전체</button>
      ${vals.map(v=>`<button data-v="${v}" class="${state.f[d]===v?'on':''}">${v}</button>`).join('')}</div></div>`;
  });
  const p=document.getElementById('fpanel'); p.innerHTML=html;
  syncDateUI();
  p.addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;
    const dim=b.parentElement.dataset.dim, v=b.dataset.v;
    if(dim==='preset'){ applyPreset(+v); }
    else { state.f[dim]=v; [...b.parentElement.children].forEach(x=>x.classList.toggle('on',x===b)); refresh(); renderSelsum(); }
  });
  document.getElementById('dStart').addEventListener('change',applyCustom);
  document.getElementById('dEnd').addEventListener('change',applyCustom);
}
function renderSelsum(){
  const L=DATA.meta.dimLabels;
  const act=DIMS.filter(d=>state.f[d]!=='전체').map(d=>`${L[d]}=<b>${state.f[d]}</b>`);
  document.getElementById('selsum').innerHTML=act.length?('선택: '+act.join(' · ')):'전체 광고 성과';
}
function bind(){
  document.getElementById('metricSeg').onclick=e=>{const b=e.target.closest('button');if(!b)return;
    state.metric=b.dataset.m;[...e.currentTarget.children].forEach(x=>x.classList.toggle('on',x===b));renderTrend();};
  document.getElementById('campSearch').oninput=e=>{state.search=e.target.value;renderCampTbl();};
  document.getElementById('sojaeSearch').oninput=e=>{state.sojaeSearch=e.target.value;renderSojaeTbl();};
  document.getElementById('promoSearch').oninput=e=>{state.promoSearch=e.target.value;renderPromoTbl();};
  document.getElementById('resetBtn').onclick=()=>{DIMS.forEach(d=>state.f[d]='전체');state.preset=7;state.end=maxDate;state.start=addDays(maxDate,-6);if(state.start<selMin)state.start=selMin;renderFilters();renderSelsum();refresh();};
  document.querySelector('.tabs').onclick=e=>{const b=e.target.closest('button');if(b)switchTab(b.dataset.tab);};
  document.getElementById('mediaTbl').onclick=e=>{const t=e.target.closest('th[data-k]');if(!t)return;
    const k=t.dataset.k;state.mediaSort.dir=state.mediaSort.key===k?-state.mediaSort.dir:-1;state.mediaSort.key=k;renderMediaTbl();};
  document.getElementById('campTbl').onclick=e=>{const t=e.target.closest('th[data-k]');if(!t)return;
    const k=t.dataset.k;state.campSort.dir=state.campSort.key===k?-state.campSort.dir:-1;state.campSort.key=k;renderCampTbl();};
  document.getElementById('sojaeTbl').onclick=e=>{const t=e.target.closest('th[data-k]');if(!t)return;
    const k=t.dataset.k;state.sojaeSort.dir=state.sojaeSort.key===k?-state.sojaeSort.dir:-1;state.sojaeSort.key=k;renderSojaeTbl();};
  document.getElementById('promoTbl').onclick=e=>{const t=e.target.closest('th[data-k]');if(!t)return;
    const k=t.dataset.k;state.promoSort.dir=state.promoSort.key===k?-state.promoSort.dir:-1;state.promoSort.key=k;renderPromoTbl();};
}

async function init(){
  DATA=await fetch('ad-data.json?t='+Date.now()).then(r=>r.json());
  const dts=[...new Set(DATA.rows.map(r=>r.dt))].sort();
  minDate=dts[0]; maxDate=dts[dts.length-1];
  selMin=addDays(maxDate,-((DATA.meta.days||90)-1)); if(selMin<minDate)selMin=minDate; // 선택 가능한 현재 밴드 시작(전년 데이터는 YoY용)
  state.end=maxDate; state.start=addDays(maxDate,-6); if(state.start<selMin)state.start=selMin; // 기본 최근 7일
  const m=DATA.meta;
  document.getElementById('period').textContent=`데이터 ${selMin} ~ ${maxDate} (YoY 비교 ${m.yoyFrom}~${m.yoyTo} 포함) · ${m.source}`;
  document.getElementById('updated').textContent='갱신 '+m.generated.slice(5,16).replace('T',' ');
  document.getElementById('costNote').innerHTML=`<b>지표 기준</b> — ${m.metrics}. ${m.note}`;
  document.getElementById('foot').textContent='지원이(JIWON-AI) · W컨셉 퍼포먼스마케팅팀 · 광고raw 마스터파일 기반';
  renderFilters(); renderSelsum(); bind(); renderAll();
}
init();
</script>
</body>
</html>
