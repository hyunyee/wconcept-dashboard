<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>W컨셉 광고 성과 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap');
  :root{
    --bg-base:#0a0e1a; --bg-card:#111827; --bg-card2:#161f33; --bg-hover:#1c2a45;
    --border:#1e2d47; --border-bright:#2d4160;
    --accent:#3b82f6; --accent-glow:rgba(59,130,246,0.25); --accent2:#6366f1;
    --green:#10b981; --green-dim:rgba(16,185,129,0.15);
    --red:#ef4444; --red-dim:rgba(239,68,68,0.18);
    --yellow:#f59e0b; --yellow-dim:rgba(245,158,11,0.15);
    --purple:#8b5cf6; --pink:#ec4899;
    --text-1:#f1f5f9; --text-2:#94a3b8; --text-3:#64748b;
    --radius:14px; --radius-sm:9px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg-base);
    color:var(--text-1);min-height:100vh;font-size:14px;line-height:1.5;
    background-image:radial-gradient(900px 400px at 80% -10%,rgba(59,130,246,0.08),transparent),
                     radial-gradient(700px 350px at 0% 0%,rgba(139,92,246,0.06),transparent);}
  .wrap{max-width:1320px;margin:0 auto;padding:0 24px 60px;}
  /* header */
  .header{display:flex;align-items:center;justify-content:space-between;
    padding:18px 24px;border-bottom:1px solid var(--border);
    background:linear-gradient(90deg,#0a0e1a,#0e1628);position:sticky;top:0;z-index:100;
    backdrop-filter:blur(12px);margin-bottom:22px;}
  .h-left{display:flex;align-items:center;gap:14px;}
  .logo{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,var(--accent),var(--accent2));font-weight:800;color:#fff;
    box-shadow:0 0 18px var(--accent-glow);font-size:13px;}
  .h-title{font-size:17px;font-weight:700;}
  .h-sub{font-size:11px;color:var(--text-3);margin-top:2px;}
  .live{display:flex;align-items:center;gap:7px;background:var(--green-dim);
    border:1px solid rgba(16,185,129,0.3);border-radius:20px;padding:5px 13px;
    font-size:11px;color:var(--green);font-weight:600;}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.6s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  /* filter bar */
  .filters{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:20px;}
  .seg{display:flex;gap:4px;background:var(--bg-card);border:1px solid var(--border);
    border-radius:10px;padding:4px;}
  .seg button{padding:6px 14px;border:none;background:transparent;color:var(--text-2);
    font-size:12.5px;font-weight:600;border-radius:7px;cursor:pointer;font-family:inherit;transition:.15s;}
  .seg button:hover{color:var(--text-1);}
  .seg button.on{background:var(--accent);color:#fff;box-shadow:0 0 12px var(--accent-glow);}
  .flabel{font-size:11px;color:var(--text-3);font-weight:600;letter-spacing:.04em;text-transform:uppercase;}
  .chips{display:flex;gap:6px;flex-wrap:wrap;}
  .chip{padding:6px 13px;border-radius:20px;border:1px solid var(--border-bright);
    background:transparent;color:var(--text-2);font-size:12px;font-weight:600;cursor:pointer;
    font-family:inherit;transition:.15s;display:flex;align-items:center;gap:6px;}
  .chip:hover{border-color:var(--accent);color:var(--text-1);}
  .chip.on{background:var(--bg-hover);border-color:var(--accent);color:var(--text-1);}
  .chip .cdot{width:8px;height:8px;border-radius:50%;}
  .spacer{flex:1;}
  /* kpi */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
  .kpi{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
    padding:16px 18px;position:relative;overflow:hidden;transition:.2s;}
  .kpi:hover{border-color:var(--border-bright);transform:translateY(-2px);}
  .kpi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);opacity:.7;}
  .kpi.k-rev::before{background:var(--green);} .kpi.k-roas::before{background:var(--yellow);}
  .kpi.k-cost::before{background:var(--accent);} .kpi.k-cpa::before{background:var(--purple);}
  .kpi .lab{font-size:11.5px;color:var(--text-2);font-weight:600;margin-bottom:8px;}
  .kpi .val{font-size:23px;font-weight:800;letter-spacing:-.02em;}
  .kpi .unit{font-size:12px;color:var(--text-3);font-weight:600;margin-left:3px;}
  .kpi .delta{font-size:11.5px;font-weight:700;margin-top:7px;display:inline-flex;align-items:center;gap:3px;}
  .up{color:var(--green);} .down{color:var(--red);} .flat{color:var(--text-3);}
  /* cards */
  .card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
    padding:20px;margin-bottom:22px;}
  .card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap;}
  .card-t{font-size:15px;font-weight:700;display:flex;align-items:center;gap:9px;}
  .card-t .bar{width:4px;height:16px;border-radius:2px;background:var(--accent);}
  .card-sub{font-size:11px;color:var(--text-3);font-weight:500;}
  .chart-box{position:relative;height:330px;}
  .grid2{display:grid;grid-template-columns:1.15fr 1fr;gap:22px;}
  @media(max-width:1000px){.grid2{grid-template-columns:1fr;}.kpis{grid-template-columns:repeat(2,1fr);}}
  /* table */
  .tbl-wrap{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:13px;white-space:nowrap;}
  th{text-align:right;padding:10px 12px;color:var(--text-2);font-weight:600;font-size:11.5px;
    border-bottom:1px solid var(--border-bright);cursor:pointer;user-select:none;letter-spacing:.02em;}
  th:first-child,td:first-child{text-align:left;}
  th.sortable:hover{color:var(--text-1);}
  th .arr{opacity:.4;font-size:9px;margin-left:3px;}
  th.act .arr{opacity:1;color:var(--accent);}
  td{padding:11px 12px;border-bottom:1px solid var(--border);}
  tbody tr:hover{background:var(--bg-card2);}
  .gtag{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:700;
    padding:2px 8px;border-radius:6px;}
  .cname{max-width:340px;overflow:hidden;text-overflow:ellipsis;display:inline-block;vertical-align:middle;}
  .chl{color:var(--text-3);font-size:11px;}
  .pos{color:var(--green);font-weight:700;} .neg{color:var(--text-3);}
  .roas-good{color:var(--green);font-weight:700;} .roas-mid{color:var(--yellow);font-weight:700;} .roas-bad{color:var(--red);font-weight:700;}
  .muted{color:var(--text-3);}
  .search{background:var(--bg-base);border:1px solid var(--border-bright);border-radius:8px;
    color:var(--text-1);padding:7px 12px;font-size:12.5px;font-family:inherit;outline:none;width:230px;}
  .search:focus{border-color:var(--accent);}
  .note{font-size:11.5px;color:var(--text-3);background:var(--bg-card2);border:1px solid var(--border);
    border-radius:9px;padding:10px 14px;margin-bottom:22px;display:flex;gap:8px;align-items:flex-start;}
  .note b{color:var(--yellow);}
  .foot{text-align:center;color:var(--text-3);font-size:11px;margin-top:30px;}
  .barmini{height:6px;border-radius:3px;background:var(--border);overflow:hidden;min-width:54px;display:inline-block;vertical-align:middle;}
  .barmini>i{display:block;height:100%;border-radius:3px;}
</style>
</head>
<body>
<div class="header">
  <div class="h-left">
    <div class="logo">지원</div>
    <div>
      <div class="h-title">광고 성과 대시보드</div>
      <div class="h-sub" id="period">불러오는 중…</div>
    </div>
  </div>
  <div class="live"><span class="dot"></span><span id="updated">LIVE</span></div>
</div>

<div class="wrap">
  <div class="filters">
    <span class="flabel">기간</span>
    <div class="seg" id="rangeSeg">
      <button data-r="7">최근 7일</button>
      <button data-r="14">최근 14일</button>
      <button data-r="30" class="on">최근 30일</button>
    </div>
    <div class="spacer"></div>
    <span class="flabel">광고 구분</span>
    <div class="chips" id="groupChips"></div>
  </div>

  <div class="kpis" id="kpis"></div>

  <div class="card">
    <div class="card-h">
      <div class="card-t"><span class="bar"></span>일별 추이</div>
      <div class="seg" id="metricSeg">
        <button data-m="money" class="on">광고비 · 매출 · ROAS</button>
        <button data-m="conv">설치 · 가입 · 첫구매</button>
      </div>
    </div>
    <div class="chart-box"><canvas id="trendChart"></canvas></div>
  </div>

  <div class="grid2">
    <div class="card">
      <div class="card-h"><div class="card-t"><span class="bar"></span>채널별 비용 vs 매출</div>
        <span class="card-sub">30일 누적</span></div>
      <div class="chart-box" style="height:360px"><canvas id="channelChart"></canvas></div>
    </div>
    <div class="card">
      <div class="card-h"><div class="card-t"><span class="bar"></span>채널 성과</div>
        <span class="card-sub">30일 누적 · 클릭 시 정렬</span></div>
      <div class="tbl-wrap"><table id="channelTbl"></table></div>
    </div>
  </div>

  <div class="card">
    <div class="card-h">
      <div class="card-t"><span class="bar"></span>캠페인별 상세</div>
      <input class="search" id="campSearch" placeholder="캠페인 검색…">
    </div>
    <div class="tbl-wrap"><table id="campTbl"></table></div>
  </div>

  <div class="note">
    <span>⚠️</span>
    <div id="costNote"></div>
  </div>

  <div class="foot" id="foot"></div>
</div>

<script>
const F = {
  won: v => v==null?'—':'₩'+Math.round(v).toLocaleString('ko-KR'),
  wonM: v => v==null?'—':(v/100000000).toFixed(v>=1e9?0:1)+'억',
  num: v => v==null?'—':Math.round(v).toLocaleString('ko-KR'),
  pct: v => v==null?'—':v.toFixed(0)+'%',
};
let DATA, MAP, state = { range:30, metric:'money', group:'전체', campSort:{key:'cost',dir:-1}, chSort:{key:'cost',dir:-1}, search:'' };
let trendChart, channelChart;

// 광고 구분자 적용
function classify(channel, campaign){
  if(MAP.campaignRules){
    for(const r of MAP.campaignRules){ if(campaign && campaign.includes(r.pattern)) return r.group; }
  }
  return MAP.channelDefaults[channel] || '기타';
}
const gColor = g => (MAP.groupColors[g]||'#64748b');
const gLabel = g => (MAP.groupLabels[g]||g);

// 파생지표
function derive(r){
  const roas = r.cost>0 ? r.revenue/r.cost*100 : null;
  return {
    ...r,
    roas,
    cpi: r.cost>0&&r.installs>0 ? r.cost/r.installs : null,
    cpaSignup: r.cost>0&&r.signup>0 ? r.cost/r.signup : null,
    cpaOrder: r.cost>0&&r.firstOrder>0 ? r.cost/r.firstOrder : null,
  };
}
const roasClass = v => v==null?'muted':(v>=600?'roas-good':v>=300?'roas-mid':'roas-bad');

function sliceDaily(n){ return DATA.daily.slice(-n); }
function sumDaily(arr){
  return arr.reduce((a,d)=>({cost:a.cost+d.cost,revenue:a.revenue+d.revenue,clicks:a.clicks+d.clicks,
    installs:a.installs+d.installs,signup:a.signup+d.signup,firstOrder:a.firstOrder+d.firstOrder}),
    {cost:0,revenue:0,clicks:0,installs:0,signup:0,firstOrder:0});
}

function renderKPIs(){
  const cur = sumDaily(sliceDaily(state.range));
  // 직전 동기간
  const prevArr = DATA.daily.slice(-state.range*2, -state.range);
  const prev = prevArr.length>=state.range ? sumDaily(prevArr) : null;
  const d = derive(cur);
  const deltaP = (c,p)=> (p==null||p===0)?null:(c-p)/p*100;
  const pd = prev?derive(prev):null;
  const cards = [
    {cls:'k-cost', lab:'총 광고비', val:F.won(d.cost), dl:deltaP(cur.cost, prev&&prev.cost), inv:true},
    {cls:'k-rev',  lab:'전환매출(광고기여)', val:F.won(d.revenue), dl:deltaP(cur.revenue, prev&&prev.revenue)},
    {cls:'k-roas', lab:'ROAS', val:F.pct(d.roas), dl:pd?(d.roas-pd.roas):null, ppt:true},
    {cls:'',       lab:'설치', val:F.num(d.installs), dl:deltaP(cur.installs, prev&&prev.installs)},
    {cls:'',       lab:'가입', val:F.num(d.signup), dl:deltaP(cur.signup, prev&&prev.signup)},
    {cls:'',       lab:'첫구매', val:F.num(d.firstOrder), dl:deltaP(cur.firstOrder, prev&&prev.firstOrder)},
    {cls:'k-cpa',  lab:'가입 CPA', val:F.won(d.cpaSignup), dl:deltaP(d.cpaSignup, pd&&pd.cpaSignup), inv:true},
    {cls:'k-cpa',  lab:'첫구매 CPA', val:F.won(d.cpaOrder), dl:deltaP(d.cpaOrder, pd&&pd.cpaOrder), inv:true},
  ];
  document.getElementById('kpis').innerHTML = cards.map(c=>{
    let dl='';
    if(c.dl!=null && isFinite(c.dl)){
      const good = c.inv ? c.dl<0 : c.dl>0;
      const cls = Math.abs(c.dl)<0.5?'flat':(good?'up':'down');
      const arrow = c.dl>0?'▲':c.dl<0?'▼':'–';
      const txt = c.ppt ? (c.dl>0?'+':'')+c.dl.toFixed(0)+'%p' : (c.dl>0?'+':'')+c.dl.toFixed(0)+'%';
      dl = `<div class="delta ${cls}">${arrow} ${txt} <span class="muted" style="font-weight:500">vs 직전</span></div>`;
    }
    return `<div class="kpi ${c.cls}"><div class="lab">${c.lab}</div>
      <div class="val">${c.val}</div>${dl}</div>`;
  }).join('');
}

function filteredChannels(){
  let chs = DATA.channels.map(derive);
  if(state.group!=='전체') chs = chs.filter(c=>classify(c.channel,'')===state.group);
  return chs;
}
function filteredCampaigns(){
  let cps = DATA.campaigns.map(c=>({...derive(c), group:classify(c.channel,c.campaign)}));
  if(state.group!=='전체') cps = cps.filter(c=>c.group===state.group);
  if(state.search) cps = cps.filter(c=>c.campaign.toLowerCase().includes(state.search.toLowerCase())||c.channel.includes(state.search));
  return cps;
}

function renderTrend(){
  const arr = sliceDaily(state.range);
  const labels = arr.map(d=>d.date.slice(5));
  const ctx = document.getElementById('trendChart');
  if(trendChart) trendChart.destroy();
  let cfg;
  if(state.metric==='money'){
    cfg = {type:'bar', data:{labels, datasets:[
      {label:'광고비', data:arr.map(d=>d.cost), backgroundColor:'rgba(59,130,246,0.55)', borderRadius:4, yAxisID:'y', order:2},
      {label:'전환매출', data:arr.map(d=>d.revenue), type:'line', borderColor:'#10b981', backgroundColor:'rgba(16,185,129,0.08)',
        borderWidth:2.5, tension:.35, fill:true, pointRadius:0, yAxisID:'y', order:1},
      {label:'ROAS(%)', data:arr.map(d=>d.cost>0?d.revenue/d.cost*100:null), type:'line', borderColor:'#f59e0b',
        borderWidth:2, borderDash:[5,4], tension:.35, pointRadius:0, yAxisID:'y1', order:0},
    ]}};
  } else {
    cfg = {type:'line', data:{labels, datasets:[
      {label:'설치', data:arr.map(d=>d.installs), borderColor:'#3b82f6', backgroundColor:'rgba(59,130,246,0.08)', borderWidth:2.4, tension:.35, fill:true, pointRadius:0},
      {label:'가입', data:arr.map(d=>d.signup), borderColor:'#8b5cf6', borderWidth:2.4, tension:.35, pointRadius:0},
      {label:'첫구매', data:arr.map(d=>d.firstOrder), borderColor:'#ec4899', borderWidth:2.4, tension:.35, pointRadius:0},
    ]}};
  }
  cfg.options = {responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
    plugins:{legend:{labels:{color:'#94a3b8',usePointStyle:true,pointStyleWidth:10,font:{size:12}}},
      tooltip:{callbacks:{label:c=>{
        const v=c.parsed.y; if(v==null)return c.dataset.label+': —';
        if(c.dataset.label==='ROAS(%)')return ' ROAS: '+v.toFixed(0)+'%';
        if(state.metric==='money')return ' '+c.dataset.label+': '+F.won(v);
        return ' '+c.dataset.label+': '+F.num(v);
      }}}},
    scales:{
      x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#64748b',font:{size:10},maxRotation:0,autoSkip:true,maxTicksLimit:12}},
      y:{position:'left',grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#64748b',font:{size:10},
        callback:v=>state.metric==='money'?(v/100000000).toFixed(1)+'억':F.num(v)}},
      ...(state.metric==='money'?{y1:{position:'right',grid:{drawOnChartArea:false},ticks:{color:'#f59e0b',font:{size:10},callback:v=>v+'%'}}}:{})
    }};
  trendChart = new Chart(ctx, cfg);
}

function renderChannelChart(){
  const chs = filteredChannels().sort((a,b)=>b.cost-a.cost||b.revenue-a.revenue);
  const ctx = document.getElementById('channelChart');
  if(channelChart) channelChart.destroy();
  channelChart = new Chart(ctx,{type:'bar',data:{labels:chs.map(c=>c.channel),datasets:[
    {label:'광고비',data:chs.map(c=>c.cost),backgroundColor:'rgba(59,130,246,0.75)',borderRadius:4},
    {label:'전환매출',data:chs.map(c=>c.revenue),backgroundColor:'rgba(16,185,129,0.7)',borderRadius:4},
  ]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
    plugins:{legend:{labels:{color:'#94a3b8',usePointStyle:true,pointStyleWidth:10,font:{size:12}}},
      tooltip:{callbacks:{label:c=>' '+c.dataset.label+': '+F.won(c.parsed.x)}}},
    scales:{x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#64748b',font:{size:10},callback:v=>(v/100000000).toFixed(0)+'억'}},
      y:{grid:{display:false},ticks:{color:'#94a3b8',font:{size:11}}}}}});
}

function th(label,key,sortState){
  const act = sortState.key===key;
  const arr = act ? (sortState.dir<0?'▼':'▲') : '▲';
  return `<th class="sortable ${act?'act':''}" data-k="${key}">${label}<span class="arr">${arr}</span></th>`;
}
function roasCell(v){ return `<td class="${roasClass(v)}">${v==null?'<span class=muted>비용없음</span>':v.toFixed(0)+'%'}</td>`; }

function renderChannelTbl(){
  const s=state.chSort;
  let chs = filteredChannels();
  chs.sort((a,b)=>{const x=a[s.key]??-1,y=b[s.key]??-1;return (x<y?-1:x>y?1:0)*s.dir;});
  const maxRev = Math.max(...chs.map(c=>c.revenue),1);
  const head = `<thead><tr>${th('채널','channel',s)}${th('광고비','cost',s)}${th('매출','revenue',s)}${th('ROAS','roas',s)}${th('설치','installs',s)}${th('가입','signup',s)}${th('첫구매','firstOrder',s)}${th('가입CPA','cpaSignup',s)}</tr></thead>`;
  const body = chs.map(c=>{
    const g=classify(c.channel,'');
    return `<tr>
      <td><span class="gtag" style="background:${gColor(g)}22;color:${gColor(g)}">${g}</span> ${c.channel}${c.costIntegrated?'':' <span class="chl">(비용 미연동)</span>'}</td>
      <td>${F.won(c.cost)}</td>
      <td>${F.won(c.revenue)} <span class="barmini"><i style="width:${(c.revenue/maxRev*100).toFixed(0)}%;background:${gColor(g)}"></i></span></td>
      ${roasCell(c.roas)}
      <td>${F.num(c.installs)}</td><td>${F.num(c.signup)}</td><td>${F.num(c.firstOrder)}</td>
      <td>${c.cpaSignup==null?'<span class=muted>—</span>':F.won(c.cpaSignup)}</td>
    </tr>`;}).join('');
  document.getElementById('channelTbl').innerHTML = head+'<tbody>'+body+'</tbody>';
}

function renderCampTbl(){
  const s=state.campSort;
  let cps = filteredCampaigns();
  cps.sort((a,b)=>{const x=a[s.key]??-1,y=b[s.key]??-1;return (x<y?-1:x>y?1:0)*s.dir;});
  const head = `<thead><tr>${th('캠페인','campaign',s)}${th('구분','group',s)}${th('광고비','cost',s)}${th('매출','revenue',s)}${th('ROAS','roas',s)}${th('설치','installs',s)}${th('가입','signup',s)}${th('첫구매','firstOrder',s)}${th('첫구매CPA','cpaOrder',s)}</tr></thead>`;
  const body = cps.map(c=>`<tr>
      <td><span class="cname" title="${c.campaign}">${c.campaign}</span><br><span class="chl">${c.channel}</span></td>
      <td><span class="gtag" style="background:${gColor(c.group)}22;color:${gColor(c.group)}">${c.group}</span></td>
      <td>${c.cost?F.won(c.cost):'<span class=muted>0</span>'}</td>
      <td>${F.won(c.revenue)}</td>
      ${roasCell(c.roas)}
      <td>${F.num(c.installs)}</td><td>${F.num(c.signup)}</td><td>${F.num(c.firstOrder)}</td>
      <td>${c.cpaOrder==null?'<span class=muted>—</span>':F.won(c.cpaOrder)}</td>
    </tr>`).join('');
  document.getElementById('campTbl').innerHTML = head+'<tbody>'+body+'</tbody>'
    + (cps.length===0?'<tbody><tr><td colspan=9 class=muted style="text-align:center;padding:24px">결과 없음</td></tr></tbody>':'');
}

function renderAll(){ renderKPIs(); renderTrend(); renderChannelChart(); renderChannelTbl(); renderCampTbl(); }

function bind(){
  document.getElementById('rangeSeg').onclick=e=>{const b=e.target.closest('button');if(!b)return;
    state.range=+b.dataset.r;[...e.currentTarget.children].forEach(x=>x.classList.toggle('on',x===b));
    renderKPIs();renderTrend();};
  document.getElementById('metricSeg').onclick=e=>{const b=e.target.closest('button');if(!b)return;
    state.metric=b.dataset.m;[...e.currentTarget.children].forEach(x=>x.classList.toggle('on',x===b));renderTrend();};
  document.getElementById('campSearch').oninput=e=>{state.search=e.target.value;renderCampTbl();};
  document.getElementById('channelTbl').onclick=e=>{const t=e.target.closest('th[data-k]');if(!t)return;
    const k=t.dataset.k;state.chSort.dir=state.chSort.key===k?-state.chSort.dir:-1;state.chSort.key=k;renderChannelTbl();};
  document.getElementById('campTbl').onclick=e=>{const t=e.target.closest('th[data-k]');if(!t)return;
    const k=t.dataset.k;state.campSort.dir=state.campSort.key===k?-state.campSort.dir:-1;state.campSort.key=k;renderCampTbl();};
}

function renderChips(){
  const groups=['전체',...MAP.groupOrder];
  document.getElementById('groupChips').innerHTML=groups.map(g=>{
    const c=g==='전체'?'#94a3b8':gColor(g);
    return `<button class="chip ${g===state.group?'on':''}" data-g="${g}">
      <span class="cdot" style="background:${c}"></span>${g==='전체'?'전체':gLabel(g)}</button>`;
  }).join('');
  document.getElementById('groupChips').onclick=e=>{const b=e.target.closest('.chip');if(!b)return;
    state.group=b.dataset.g;renderChips();renderChannelChart();renderChannelTbl();renderCampTbl();};
}

async function init(){
  [DATA,MAP] = await Promise.all([
    fetch('ad-data.json?t='+Date.now()).then(r=>r.json()),
    fetch('channel-map.json?t='+Date.now()).then(r=>r.json()),
  ]);
  const m=DATA.meta;
  document.getElementById('period').textContent=`${m.from} ~ ${m.to} · ${m.source}`;
  document.getElementById('updated').textContent='갱신 '+m.generated.slice(5,16).replace('T',' ');
  document.getElementById('costNote').innerHTML=`<b>비용 기준</b> — ${m.costNote}`;
  document.getElementById('foot').textContent=`지원이(JIWON-AI) · W컨셉 퍼포먼스마케팅팀 · 매출지표: ${m.revenueMetric}`;
  renderChips(); bind(); renderAll();
}
init();
</script>
</body>
</html>
