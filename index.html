<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>W컨셉 실시간 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap');
  
  :root {
    --bg-base: #0a0e1a;
    --bg-card: #111827;
    --bg-card2: #161f33;
    --bg-hover: #1c2a45;
    --border: #1e2d47;
    --border-bright: #2d4160;
    --accent: #3b82f6;
    --accent-glow: rgba(59,130,246,0.25);
    --accent2: #6366f1;
    --green: #10b981;
    --green-dim: rgba(16,185,129,0.15);
    --red: #ef4444;
    --red-dim: rgba(239,68,68,0.18);
    --yellow: #f59e0b;
    --yellow-dim: rgba(245,158,11,0.15);
    --text-1: #f1f5f9;
    --text-2: #94a3b8;
    --text-3: #475569;
    --radius: 12px;
    --radius-sm: 8px;
  }
  
  * { margin:0; padding:0; box-sizing:border-box; }
  
  body {
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: var(--bg-base);
    color: var(--text-1);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }
  
  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(90deg, #0a0e1a 0%, #0e1628 100%);
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(12px);
  }
  .header-left { display:flex; align-items:center; gap:14px; }
  .logo-dot {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items:center; justify-content:center;
    font-size: 14px; font-weight: 700; color: #fff;
    box-shadow: 0 0 16px var(--accent-glow);
  }
  .header-title { font-size: 16px; font-weight: 700; color: var(--text-1); }
  .header-sub { font-size: 11px; color: var(--text-3); margin-top: 1px; }
  .live-badge {
    display: flex; align-items:center; gap:6px;
    background: var(--green-dim); border: 1px solid rgba(16,185,129,0.3);
    border-radius: 20px; padding: 4px 12px;
    font-size: 11px; color: var(--green); font-weight: 600;
  }
  .live-dot {
    width:6px; height:6px; border-radius:50%; background:var(--green);
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
  
  /* ── Date Filter Bar ── */
  .filter-bar {
    display: flex; align-items:center; gap:8px;
    padding: 14px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-card);
    flex-wrap: wrap;
  }
  .filter-label { font-size:11px; color:var(--text-3); font-weight:600; letter-spacing:0.05em; text-transform:uppercase; margin-right:4px; }
  .date-btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border-bright);
    background: transparent;
    color: var(--text-2);
    font-size: 12px; font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .date-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
  .date-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: 0 0 12px var(--accent-glow); }
  .filter-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
  .custom-date-wrap { display:flex; align-items:center; gap:6px; }
  .custom-date-wrap input {
    background: var(--bg-base);
    border: 1px solid var(--border-bright);
    border-radius: 6px;
    color: var(--text-1);
    padding: 5px 10px;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    outline: none;
  }
  .custom-date-wrap input:focus { border-color: var(--accent); }
  .compare-label { font-size:11px; color:var(--text-3); font-weight:600; letter-spacing:0.05em; text-transform:uppercase; margin-left: 8px; }
  .compare-btn {
    padding: 5px 12px; border-radius:6px; border:1px solid var(--border-bright);
    background: transparent; color:var(--text-2); font-size:12px; cursor:pointer;
    transition:all 0.15s; font-family:inherit;
  }
  .compare-btn:hover { border-color:var(--accent2); color:var(--accent2); }
  .compare-btn.active { background:var(--accent2); border-color:var(--accent2); color:#fff; }
  
  /* ── Main Layout ── */
  .main { padding: 20px 28px; display:flex; flex-direction:column; gap:20px; }
  
  /* ── KPI Section ── */
  .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .kpi-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .kpi-card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:2px;
  }
  .kpi-card.blue::before { background: linear-gradient(90deg,var(--accent),transparent); }
  .kpi-card.indigo::before { background: linear-gradient(90deg,var(--accent2),transparent); }
  .kpi-card.green::before { background: linear-gradient(90deg,var(--green),transparent); }
  .kpi-card.yellow::before { background: linear-gradient(90deg,var(--yellow),transparent); }
  .kpi-card.alert { border-color: var(--red) !important; background: linear-gradient(135deg, var(--bg-card) 0%, rgba(239,68,68,0.06) 100%); }
  .kpi-card.alert::before { background: linear-gradient(90deg,var(--red),transparent); }
  
  .kpi-label { font-size:11px; color:var(--text-3); font-weight:600; letter-spacing:0.05em; text-transform:uppercase; }
  .kpi-value { font-size: 26px; font-weight: 700; color: var(--text-1); margin: 8px 0 6px; line-height:1; }
  .kpi-value.alert-text { color: var(--red); }
  .kpi-row { display:flex; align-items:center; justify-content:space-between; }
  .kpi-badge {
    font-size:10px; font-weight:600; padding:2px 8px; border-radius:4px;
  }
  .kpi-badge.up { background:var(--green-dim); color:var(--green); }
  .kpi-badge.down { background:var(--red-dim); color:var(--red); }
  .kpi-badge.neutral { background:rgba(148,163,184,0.1); color:var(--text-2); }
  .kpi-target { font-size:11px; color:var(--text-3); }
  .kpi-progress-wrap { margin-top: 10px; }
  .kpi-progress-bar { height:3px; background:var(--border); border-radius:3px; overflow:hidden; }
  .kpi-progress-fill { height:100%; border-radius:3px; transition: width 0.6s ease; }
  .kpi-progress-fill.blue { background: var(--accent); }
  .kpi-progress-fill.green { background: var(--green); }
  .kpi-progress-fill.yellow { background: var(--yellow); }
  .kpi-progress-fill.red { background: var(--red); }
  .kpi-progress-fill.indigo { background: var(--accent2); }
  .kpi-progress-pct { font-size: 11px; font-weight:600; margin-top:4px; }
  
  /* Forecasted section */
  .forecast-row { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
  .forecast-chip {
    font-size:10px; padding:2px 8px; border-radius:4px;
    background: rgba(59,130,246,0.1); color:var(--accent); border:1px solid rgba(59,130,246,0.2);
  }
  
  /* ── Section Header ── */
  .section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .section-title { font-size:13px; font-weight:700; color:var(--text-1); display:flex;align-items:center;gap:8px; }
  .section-title-dot { width:6px;height:6px;border-radius:50%;background:var(--accent); }
  .section-sub { font-size:11px; color:var(--text-3); }
  
  /* ── Chart Cards ── */
  .chart-grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .chart-grid-1 { display:grid; grid-template-columns:1fr; gap:14px; }
  .chart-card {
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding: 18px 20px;
  }
  .chart-card.alert-card { border-color: rgba(239,68,68,0.4); }
  
  .legend-row { display:flex; gap:14px; flex-wrap:wrap; margin-bottom:14px; }
  .legend-item { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--text-2); }
  .legend-dot { width:8px;height:8px;border-radius:50%; flex-shrink:0; }
  
  /* Alert badge inline */
  .alert-badge {
    display:inline-flex; align-items:center; gap:4px;
    background:var(--red-dim); border:1px solid rgba(239,68,68,0.3);
    border-radius:4px; padding:2px 8px; font-size:10px; color:var(--red); font-weight:600;
  }
  
  /* ── Summary Box ── */
  .summary-box {
    background: var(--bg-card2);
    border: 1px solid var(--border-bright);
    border-radius: var(--radius);
    padding: 16px 22px;
    display: flex; flex-direction: column; gap: 9px;
  }
  .summary-row {
    display: flex; align-items: baseline; gap: 6px;
    font-size: 12.5px; color: var(--text-2); line-height: 1.5; flex-wrap: wrap;
  }
  .summary-row .s-num { font-size: 13px; font-weight: 700; color: var(--text-1); }
  .summary-row .s-num.good { color: var(--green); }
  .summary-row .s-num.bad  { color: var(--red); }
  .summary-row .s-num.warn { color: var(--yellow); }
  .summary-row .s-idx { font-size: 11px; font-weight: 700; color: var(--text-3); min-width: 14px; }
  .summary-divider { width:100%; height:1px; background: var(--border); margin: 2px 0; }
  .summary-campaign-input {
    background: var(--bg-base); border: 1px solid var(--border-bright);
    border-radius: 5px; color: var(--text-1); padding: 2px 8px;
    font-size: 12px; font-family: inherit; width: 90px; text-align: right;
    outline: none;
  }
  .summary-campaign-input:focus { border-color: var(--accent); }

  /* ── Anomaly Panel ── */
  .anomaly-panel {
    background: var(--bg-card);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: var(--radius);
    padding: 16px 20px;
  }
  .anomaly-title { font-size:12px; font-weight:700; color:var(--red); display:flex;align-items:center;gap:6px; margin-bottom:12px; }
  .anomaly-list { display:flex; flex-direction:column; gap:8px; }
  .anomaly-item {
    display:flex; align-items:center; gap:10px;
    padding:8px 12px; border-radius:var(--radius-sm);
    background: var(--red-dim); border: 1px solid rgba(239,68,68,0.2);
  }
  .anomaly-hour { font-size:11px; font-weight:700; color:var(--red); min-width:30px; }
  .anomaly-desc { font-size:12px; color:var(--text-1); flex:1; }
  .anomaly-value { font-size:11px; color:var(--red); font-weight:600; }
  
  canvas { display:block; }
  
  .chart-wrapper { position:relative; }
  
  /* scrollbar */
  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:var(--bg-base); }
  ::-webkit-scrollbar-thumb { background:var(--border-bright); border-radius:3px; }
  
  .updated-at { font-size:10px; color:var(--text-3); }
  
  @media (max-width: 1100px) {
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .chart-grid-2 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="logo-dot">W</div>
    <div>
      <div class="header-title">W컨셉 실시간 대시보드</div>
      <div class="header-sub" id="header-date">로딩 중...</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:12px;">
    <span class="updated-at" id="updated-at"></span>
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
  </div>
</header>

<div class="filter-bar">
  <span class="filter-label">기준일</span>
  <button class="date-btn active" id="btn-today" onclick="setDatePreset('today')">오늘</button>
  <div class="filter-sep"></div>
  <div class="custom-date-wrap">
    <span style="font-size:12px;color:var(--text-3);">직접선택</span>
    <input type="date" id="custom-date" onchange="setCustomDate(this.value)">
  </div>
  <div class="filter-sep"></div>
  <span class="compare-label">비교</span>
  <button class="compare-btn active" id="btn-lw" onclick="toggleCompare('lw')">전주동요일</button>
  <button class="compare-btn active" id="btn-lm" onclick="toggleCompare('lm')">전월동요일</button>
  <button class="compare-btn active" id="btn-ly" onclick="toggleCompare('ly')">전년동요일</button>
</div>

<main class="main">
  <!-- Summary Box -->
  <div class="summary-box" id="summary-box"></div>

  <!-- KPI -->
  <div class="kpi-grid" id="kpi-grid"></div>
  
  <!-- Anomaly: 오늘 날짜일 때만 표시 -->
  <div class="anomaly-panel" id="anomaly-panel" style="display:none;">
    <div class="anomaly-title">⚠ 특이사항 감지</div>
    <div class="anomaly-list" id="anomaly-list"></div>
  </div>
  
  <!-- Charts Row 1: Orders + Revenue -->
  <div class="chart-grid-2">
    <div class="chart-card" id="card-orders">
      <div class="section-header">
        <div class="section-title"><div class="section-title-dot"></div>시간대별 주문건수</div>
        <div class="legend-row" id="legend-orders"></div>
      </div>
      <div class="chart-wrapper"><canvas id="chart-orders" height="220"></canvas></div>
    </div>
    <div class="chart-card" id="card-revenue">
      <div class="section-header">
        <div class="section-title"><div class="section-title-dot" style="background:var(--accent2)"></div>시간대별 총수주</div>
        <div class="legend-row" id="legend-revenue"></div>
      </div>
      <div class="chart-wrapper"><canvas id="chart-revenue" height="220"></canvas></div>
    </div>
  </div>

  <!-- Charts Row 2: Net Revenue + DAU -->
  <div class="chart-grid-2">
    <div class="chart-card" id="card-netrev">
      <div class="section-header">
        <div class="section-title"><div class="section-title-dot" style="background:var(--green)"></div>시간대별 순수주 <span style="font-size:10px;color:var(--text-3);font-weight:400;margin-left:6px;">※ 취소/반품 시차로 시간대별 음수 발생 가능, 누적 기준 해석</span></div>
        <div class="legend-row" id="legend-netrev"></div>
      </div>
      <div class="chart-wrapper"><canvas id="chart-netrev" height="220"></canvas></div>
    </div>
    <div class="chart-card" id="card-dau">
      <div class="section-header">
        <div class="section-title"><div class="section-title-dot" style="background:var(--yellow)"></div>시간대별 DAU</div>
        <div class="legend-row" id="legend-dau"></div>
      </div>
      <div class="chart-wrapper"><canvas id="chart-dau" height="220"></canvas></div>
    </div>
  </div>

  <!-- Charts Row 3: APP DAU -->
  <div class="chart-grid-2">
    <div class="chart-card" id="card-appdau">
      <div class="section-header">
        <div class="section-title"><div class="section-title-dot" style="background:#fb923c"></div>시간대별 APP DAU</div>
        <div class="legend-row" id="legend-appdau"></div>
      </div>
      <div class="chart-wrapper"><canvas id="chart-appdau" height="220"></canvas></div>
    </div>
    <div class="chart-card" style="background:transparent;border:1px dashed var(--border);display:flex;align-items:center;justify-content:center;">
      <span style="color:var(--text-3);font-size:12px;">추가 차트 영역</span>
    </div>
  </div>

</main>

<script>
// ═══════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════
let RAW = {};

// State
let selectedDate = '';
let compareFlags = { lw: true, lm: true, ly: true };
let charts = {};

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
const fmt_num = v => v >= 1e8 ? (v/1e8).toFixed(1)+'억' : v >= 1e4 ? (v/1e4).toFixed(0)+'만' : v.toLocaleString();
const fmt_rev = v => v >= 1e8 ? (v/1e8).toFixed(1)+'억' : v >= 1e6 ? (v/1e6).toFixed(1)+'백만' : (v/1e4).toFixed(0)+'만';
const fmt_pct = v => (v >= 0 ? '+' : '') + v.toFixed(1) + '%';

function getAvailableDates() {
  return Object.keys(RAW).sort();
}

function getLastDate() {
  const dates = getAvailableDates();
  return dates[dates.length - 1];
}

// ── 날짜 유틸: ISO string("YYYY-MM-DD")을 UTC가 아닌 로컬 기준으로 파싱 ──
function parseLocalDate(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  return new Date(y, m - 1, d); // month 0-indexed, 로컬 time
}

function localDateToStr(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function getDateByOffset(baseDate, days) {
  const d = parseLocalDate(baseDate);
  d.setDate(d.getDate() + days);
  return localDateToStr(d);
}

// 전월/전년 동요일: 대상 월에서 기준일과 같은 주차(N번째) + 같은 요일
function findSameWeekdayNth(baseDate, targetYear, targetMonth) {
  const base = parseLocalDate(baseDate);
  const wday = base.getDay();                          // 0=일 ~ 6=토
  const nth = Math.floor((base.getDate() - 1) / 7);   // 0-based 주차

  let count = -1;
  for (let day = 1; day <= 31; day++) {
    const c = new Date(targetYear, targetMonth, day);
    if (c.getMonth() !== targetMonth) break;           // 월 넘어가면 종료
    if (c.getDay() === wday) {
      count++;
      if (count === nth) return localDateToStr(c);
    }
  }
  // 해당 주차가 없으면(5주차 등) 마지막 같은 요일 반환
  let last = null;
  for (let day = 1; day <= 31; day++) {
    const c = new Date(targetYear, targetMonth, day);
    if (c.getMonth() !== targetMonth) break;
    if (c.getDay() === wday) last = localDateToStr(c);
  }
  return last;
}

function getComparisonDates(date) {
  return {
    lw: getDateByOffset(date, -7),   // 전주동요일: -7일
    lm: getDateByOffset(date, -28),  // 전월동요일: -28일
    ly: getDateByOffset(date, -364), // 전년동요일: -364일 (52주)
  };
}

// RAW 구조: [orders(0), revenue(1), net_rev(2, null가능), dau(3), appdau(4)]
function getHourlyData(date) {
  const rows = RAW[date];
  if (!rows) return Array(24).fill([0,0,null,0,0]);
  return rows.map(r => r || [0,0,null,0,0]);
}

function getDailyTotal(date) {
  const rows = getHourlyData(date);
  const netRows = rows.filter(r => r[2] !== null);
  return {
    orders:    rows.reduce((a,r)=>a+r[0],0),
    revenue:   rows.reduce((a,r)=>a+r[1],0),
    net_rev:   netRows.length ? netRows.reduce((a,r)=>a+r[2],0) : null,
    dau:       Math.max(...rows.map(r=>r[3])),
    appdau:    Math.max(...rows.map(r=>r[4]))
  };
}

// 순수주 누적 (null 시간대 제외)
function getNetCumul(date, upToH) {
  const rows = getHourlyData(date);
  let s = 0, hasData = false;
  for (let h = 0; h <= upToH; h++) {
    if (rows[h] && rows[h][2] !== null) { s += rows[h][2]; hasData = true; }
  }
  return hasData ? s : null;
}

// 마지막 유효 시간 (총수주 기준 / 순수주 기준 분리)
function getCurrentHour(date) {
  const rows = getHourlyData(date);
  for (let h = 23; h >= 0; h--) {
    if (rows[h] && rows[h][0] > 0) return h;
  }
  return 0;
}

function getCurrentNetHour(date) {
  const rows = getHourlyData(date);
  for (let h = 23; h >= 0; h--) {
    if (rows[h] && rows[h][2] !== null) return h;
  }
  return -1;
}

// 예상마감 (총수주 + 순수주 각각)
function getForecast(date) {
  const curHour    = getCurrentHour(date);
  const curNetHour = getCurrentNetHour(date);
  const rows = getHourlyData(date);
  const accum_orders = rows.slice(0,curHour+1).reduce((a,r)=>a+r[0],0);
  const accum_rev    = rows.slice(0,curHour+1).reduce((a,r)=>a+r[1],0);
  const accum_net    = curNetHour >= 0 ? getNetCumul(date, curNetHour) : null;

  const comps = getComparisonDates(date);
  const compDates = [comps.lw, comps.lm, comps.ly].filter(d => d && RAW[d]);

  if (compDates.length === 0) {
    return { orders: accum_orders, revenue: accum_rev, net_rev: accum_net, curHour, curNetHour };
  }

  // 총수주·주문 예상마감 비율
  let ratios_o = [], ratios_r = [], ratios_n = [];
  compDates.forEach(cd => {
    const cr = getHourlyData(cd);
    const acc_o = cr.slice(0,curHour+1).reduce((a,r)=>a+r[0],0);
    const acc_r = cr.slice(0,curHour+1).reduce((a,r)=>a+r[1],0);
    const tot_o = cr.reduce((a,r)=>a+r[0],0);
    const tot_r = cr.reduce((a,r)=>a+r[1],0);
    if (acc_o > 0) ratios_o.push(tot_o / acc_o);
    if (acc_r > 0) ratios_r.push(tot_r / acc_r);

    // 순수주 비율 (curNetHour 기준)
    if (curNetHour >= 0) {
      const acc_n = getNetCumul(cd, curNetHour);
      const tot_n = getDailyTotal(cd).net_rev;
      if (acc_n && acc_n > 0 && tot_n !== null) ratios_n.push(tot_n / acc_n);
    }
  });

  const avg_o = ratios_o.length ? ratios_o.reduce((a,b)=>a+b)/ratios_o.length : 1;
  const avg_r = ratios_r.length ? ratios_r.reduce((a,b)=>a+b)/ratios_r.length : 1;
  const avg_n = ratios_n.length ? ratios_n.reduce((a,b)=>a+b)/ratios_n.length : null;

  return {
    orders:   Math.round(accum_orders * avg_o),
    revenue:  Math.round(accum_rev    * avg_r),
    net_rev:  avg_n !== null && accum_net !== null ? Math.round(accum_net * avg_n) : null,
    curHour, curNetHour,
    accum_orders, accum_rev, accum_net,
  };
}

// 일자별 타겟 (총수주 / 순수주)
let DAILY_TARGETS = {};

function getTargets(date) {
  const t = DAILY_TARGETS[date];
  if (t) {
    return { revenue: t.revenue, net_revenue: t.net_revenue, event: t.event, isReal: true };
  }
  // 타겟 없는 날짜: 전주동요일 실적 기준 참고값
  const lw = getDateByOffset(date, -7);
  const base = lw && RAW[lw] ? getDailyTotal(lw) : null;
  if (!base) return { revenue: 0, net_revenue: 0, event: null, isReal: false };
  return { revenue: Math.round(base.revenue * 1.05), net_revenue: 0, event: null, isReal: false };
}

// Anomaly detection: hour where value drops > 30% vs comparison avg
function detectAnomalies(date) {
  const comps = getComparisonDates(date);
  const compDates = [comps.lw, comps.lm, comps.ly].filter(d => d && RAW[d]);
  if (compDates.length === 0) return [];
  
  const rows = getHourlyData(date);
  const curHour = getCurrentHour(date);
  const anomalies = [];
  
  for (let h = 0; h <= curHour; h++) {
    const vals = compDates.map(cd => getHourlyData(cd)[h][0]);
    const avg = vals.reduce((a,b)=>a+b,0) / vals.length;
    const cur = rows[h][0];
    if (avg > 0 && cur > 0) {
      const ratio = (cur - avg) / avg;
      if (ratio < -0.3) {
        anomalies.push({ hour: h, type: '주문급감', cur, avg, ratio });
      }
    }
    // Revenue anomaly
    const vals_r = compDates.map(cd => getHourlyData(cd)[h][1]);
    const avg_r = vals_r.reduce((a,b)=>a+b,0) / vals_r.length;
    const cur_r = rows[h][1];
    if (avg_r > 0 && cur_r > 0) {
      const ratio_r = (cur_r - avg_r) / avg_r;
      if (ratio_r < -0.35) {
        anomalies.push({ hour: h, type: '매출급감', cur: cur_r, avg: avg_r, ratio: ratio_r });
      }
    }
  }
  
  // Deduplicate by hour+type, keep top 5
  const seen = new Set();
  return anomalies.filter(a => {
    const key = `${a.hour}-${a.type}`;
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  }).slice(0, 5);
}

// RENDER KPI
// ═══════════════════════════════════════════════
function renderKPI(date) {
  const curHour = getCurrentHour(date);
  const total = getDailyTotal(date);
  const forecast = getForecast(date);
  const targets = getTargets(date);
  const comps = getComparisonDates(date);
  const lw_total = comps.lw && RAW[comps.lw] ? getDailyTotal(comps.lw) : null;

  const rows = getHourlyData(date);
  const accum = {
    orders:  rows.slice(0, curHour+1).reduce((a,r)=>a+r[0],0),
    revenue: rows.slice(0, curHour+1).reduce((a,r)=>a+r[1],0),
  };
  const lw_accum = comps.lw && RAW[comps.lw] ? {
    orders:  getHourlyData(comps.lw).slice(0,curHour+1).reduce((a,r)=>a+r[0],0),
    revenue: getHourlyData(comps.lw).slice(0,curHour+1).reduce((a,r)=>a+r[1],0),
  } : null;

  // 달성률: 예상마감 / 타겟
  const rev_pct = targets.revenue     > 0 ? (forecast.revenue  / targets.revenue     * 100) : 0;
  const net_pct = targets.net_revenue > 0 && forecast.net_rev !== null
                ? (forecast.net_rev  / targets.net_revenue * 100) : null;

  const ord_yoy = lw_accum && lw_accum.orders  > 0 ? (accum.orders  - lw_accum.orders)  / lw_accum.orders  * 100 : 0;
  const rev_yoy = lw_accum && lw_accum.revenue > 0 ? (accum.revenue - lw_accum.revenue) / lw_accum.revenue * 100 : 0;

  const isRevAlert = targets.isReal && rev_pct < 85;
  const isNetAlert = targets.isReal && net_pct !== null && net_pct < 85;
  const targetLabel = targets.isReal ? '타겟' : '참고타겟(전주+5%)';

  // 현재 누적 순수주
  const curNetH   = getCurrentNetHour(date);
  const accum_net = curNetH >= 0 ? getNetCumul(date, curNetH) : null;

  const kpis = [
    {
      label: '당일 누적 주문',
      colorClass: 'blue',
      value: accum.orders.toLocaleString() + '건',
      alert: false,
      sub: `전주동요일(동시간) 대비 ${fmt_pct(ord_yoy)}`,
      badge: ord_yoy,
      progress: 0,
      progressClass: 'blue',
      forecast: `예상마감 ${forecast.orders.toLocaleString()}건`,
      target: `전주동요일 ${lw_total ? lw_total.orders.toLocaleString()+'건' : '-'}`,
    },
    {
      label: '당일 누적 총수주',
      colorClass: 'indigo',
      value: fmt_rev(accum.revenue),
      alert: isRevAlert,
      sub: `전주동요일(동시간) 대비 ${fmt_pct(rev_yoy)}`,
      badge: rev_yoy,
      progress: Math.min(rev_pct, 100),
      progressClass: rev_pct >= 100 ? 'green' : rev_pct >= 85 ? 'indigo' : 'red',
      forecast: `예상마감 ${fmt_rev(forecast.revenue)}`,
      target: `${targetLabel} ${fmt_rev(targets.revenue)} | 달성률 ${rev_pct.toFixed(1)}%`,
    },
    {
      label: '당일 누적 순수주',
      colorClass: 'green',
      value: accum_net !== null ? fmt_rev(accum_net) : '-',
      alert: isNetAlert,
      sub: targets.isReal ? `순수주 타겟 ${fmt_rev(targets.net_revenue)}` : `예상마감 ${forecast.net_rev !== null ? fmt_rev(forecast.net_rev) : '-'}`,
      badge: net_pct !== null ? net_pct - 100 : null,
      progress: net_pct !== null ? Math.min(net_pct, 100) : 0,
      progressClass: net_pct === null ? 'blue' : net_pct >= 100 ? 'green' : net_pct >= 85 ? 'yellow' : 'red',
      forecast: `예상마감 ${forecast.net_rev !== null ? fmt_rev(forecast.net_rev) : '-'}`,
      target: targets.isReal && net_pct !== null ? `${targetLabel}(순) ${fmt_rev(targets.net_revenue)} | 달성률 ${net_pct.toFixed(1)}%` : '-',
    },
    {
      label: '기준 시간대',
      colorClass: 'yellow',
      value: `${curHour}시`,
      alert: false,
      sub: `${date} (${getWeekdayLabel(date)})`,
      badge: null,
      progress: ((curHour+1)/24*100),
      progressClass: 'yellow',
      forecast: `일 진행률 ${((curHour+1)/24*100).toFixed(0)}%`,
      target: `24시간 중 ${curHour+1}시간 경과`,
    },
  ];

  document.getElementById('kpi-grid').innerHTML = kpis.map(k => `
    <div class="kpi-card ${k.colorClass} ${k.alert ? 'alert' : ''}">
      <div class="kpi-label">${k.label} ${k.alert ? '<span class="alert-badge">⚠ 주의</span>' : ''}</div>
      <div class="kpi-value ${k.alert ? 'alert-text' : ''}">${k.value}</div>
      <div class="kpi-row">
        <span class="kpi-target">${k.sub}</span>
        ${k.badge !== null ? `<span class="kpi-badge ${k.badge >= 0 ? 'up' : 'down'}">${k.badge >= 0 ? '▲' : '▼'} ${Math.abs(k.badge).toFixed(1)}%</span>` : ''}
      </div>
      ${k.progress > 0 ? `
      <div class="kpi-progress-wrap">
        <div class="kpi-progress-bar"><div class="kpi-progress-fill ${k.progressClass}" style="width:${k.progress}%"></div></div>
        <div class="kpi-progress-pct" style="color:${k.progressClass==='red'?'var(--red)':k.progressClass==='green'?'var(--green)':'var(--text-2)'}">${k.target}</div>
      </div>` : `<div style="margin-top:8px;font-size:11px;color:var(--text-3)">${k.target}</div>`}
      <div class="forecast-row"><span class="forecast-chip">${k.forecast}</span></div>
    </div>
  `).join('');
}

// RENDER SUMMARY BOX
// ═══════════════════════════════════════════════
let campaignBudget = 0;

function renderSummary(date) {
  const curHour    = getCurrentHour(date);
  const curNetHour = getCurrentNetHour(date);
  const targets    = getTargets(date);
  const comps      = getComparisonDates(date);
  const forecast   = getForecast(date);
  const rows       = getHourlyData(date);

  const accum_rev = rows.slice(0, curHour+1).reduce((a,r)=>a+r[1], 0);
  const accum_net = curNetHour >= 0 ? getNetCumul(date, curNetHour) : null;

  const lm_rows = comps.lm && RAW[comps.lm] ? getHourlyData(comps.lm) : null;
  const ly_rows = comps.ly && RAW[comps.ly] ? getHourlyData(comps.ly) : null;
  const lm_accum_rev = lm_rows ? lm_rows.slice(0,curHour+1).reduce((a,r)=>a+r[1],0) : 0;

  const lm_tot = lm_rows ? getDailyTotal(comps.lm) : null;
  const ly_tot = ly_rows ? getDailyTotal(comps.ly) : null;

  const rev_yoy = ly_tot && ly_tot.revenue > 0 ? (forecast.revenue - ly_tot.revenue) / ly_tot.revenue * 100 : null;
  const ord_yoy = ly_tot && ly_tot.orders  > 0 ? (forecast.orders  - ly_tot.orders)  / ly_tot.orders  * 100 : null;

  const rev_ach = targets.revenue     > 0 ? forecast.revenue  / targets.revenue     * 100 : null;
  const net_ach = targets.net_revenue > 0 && forecast.net_rev !== null
                  ? forecast.net_rev / targets.net_revenue * 100 : null;

  const bgt = campaignBudget;
  const bgt_vs_fc  = bgt > 0 && forecast.revenue > 0 ? bgt / forecast.revenue * 100 : 0;
  const bgt_vs_tgt = bgt > 0 && targets.revenue  > 0 ? bgt / targets.revenue  * 100 : 0;

  function nr(v)   { return `<span class="s-num">${fmt_rev(v)}</span>`; }
  function nord(v) { return `<span class="s-num">${v.toLocaleString()}건</span>`; }
  function pct(v)  {
    if (v === null) return '<span class="s-num warn">-</span>';
    const c = v >= 0 ? 'good' : 'bad';
    return `<span class="s-num ${c}">${v >= 0 ? '+' : ''}${v.toFixed(1)}%</span>`;
  }
  function ach(v) {
    if (v === null) return '<span class="s-num warn">-</span>';
    const c = v >= 100 ? 'good' : v >= 85 ? 'warn' : 'bad';
    return `<span class="s-num ${c}">${v.toFixed(0)}%</span>`;
  }
  const dim = s => `<span style="color:var(--text-3)">${s}</span>`;

  const todayLabel = `${date.slice(5).replace('-','/')}(${getWeekdayLabel(date)})`;
  const lmLabel = comps.lm ? `${comps.lm.slice(5).replace('-','/')}(${getWeekdayLabel(comps.lm)})` : '-';
  const lyLabel = comps.ly ? `${comps.ly.slice(5).replace('-','/')}(${getWeekdayLabel(comps.ly)})` : '-';

  const lines = [];

  // ① 타겟
  lines.push(
    `<span class="s-idx">①</span> <b>${todayLabel}</b> ${dim('타겟')} 총수주 ${nr(targets.revenue)} · 순수주 ${nr(targets.net_revenue)}`
  );

  // ② 현재 누적
  lines.push(
    `<span class="s-idx">②</span> ${dim(curHour+'시 기준')} 총수주 ${nr(accum_rev)}`
    + (accum_net !== null ? ` · 순수주 ${nr(accum_net)}` : '')
    + (lm_accum_rev > 0 ? `  ${dim('전월동요일 동시간')} ${nr(lm_accum_rev)}` : '')
  );

  // ③ 예상마감
  lines.push(
    `<span class="s-idx">③</span> ${dim('예상마감')} 총수주 ${nr(forecast.revenue)} ${dim('달성률')} ${ach(rev_ach)} ${dim('YoY')} ${pct(rev_yoy)}`
    + (forecast.net_rev !== null ? ` ${dim('| 순수주')} ${nr(forecast.net_rev)} ${dim('달성률')} ${ach(net_ach)}` : '')
    + ` ${dim('| 주문건수')} ${nord(forecast.orders)} ${dim('YoY')} ${pct(ord_yoy)}`
  );

  // ④ 캠페인 운영비
  const bgtDisplay = bgt > 0
    ? `${nr(bgt)} ${dim('예상마감 대비')} <span class="s-num warn">${bgt_vs_fc.toFixed(1)}%</span> ${dim('/ 타겟 대비')} <span class="s-num">${bgt_vs_tgt.toFixed(1)}%</span>`
    : `<input class="summary-campaign-input" type="text" placeholder="예: 56000000" onchange="setCampaignBudget(this.value)"> ${dim('원 입력 시 자동계산')}`;
  lines.push(`<span class="s-idx">④</span> ${dim('금일 캠페인 운영비')} ${bgtDisplay}`);

  // ⑤ 비교일 마감
  lines.push(
    `<span class="s-idx">⑤</span> ${dim('비교일 마감')} —`
    + (lm_tot ? ` ${dim('전월동요일')} ${dim('('+lmLabel+')')} 총수주 ${nr(lm_tot.revenue)}` + (lm_tot.net_rev !== null ? ` / 순수주 ${nr(lm_tot.net_rev)}` : '') : '')
    + (ly_tot ? ` ${dim('| 전년동요일')} ${dim('('+lyLabel+')')} 총수주 ${nr(ly_tot.revenue)}` + (ly_tot.net_rev !== null ? ` / 순수주 ${nr(ly_tot.net_rev)}` : '') : '')
  );

  document.getElementById('summary-box').innerHTML = lines.map((r, i) =>
    `<div class="summary-row">${r}</div>` + (i < lines.length-1 ? '<div class="summary-divider"></div>' : '')
  ).join('');
}

function setCampaignBudget(val) {
  const parsed = parseInt(val.replace(/[^0-9]/g,''), 10);
  campaignBudget = isNaN(parsed) ? 0 : parsed;
  renderSummary(selectedDate);
}

// RENDER ANOMALIES (오늘 날짜일 때만)
// ═══════════════════════════════════════════════
function renderAnomalies(date) {
  const panel = document.getElementById('anomaly-panel');
  // 오늘 날짜(데이터 마지막일)가 아니면 숨김
  if (date !== getLastDate()) { panel.style.display = 'none'; return; }
  const anomalies = detectAnomalies(date);
  if (anomalies.length === 0) { panel.style.display = 'none'; return; }
  panel.style.display = 'block';
  document.getElementById('anomaly-list').innerHTML = anomalies.map(a => `
    <div class="anomaly-item">
      <div class="anomaly-hour">${String(a.hour).padStart(2,'0')}시</div>
      <div class="anomaly-desc">${a.type} 감지 — 비교 평균 ${a.type.includes('매출') ? fmt_rev(a.avg) : a.avg.toLocaleString()+'건'}</div>
      <div class="anomaly-value">${fmt_pct(a.ratio * 100)}</div>
    </div>
  `).join('');
}

// ═══════════════════════════════════════════════
// RENDER CHARTS
// ═══════════════════════════════════════════════
const HOURS = Array.from({length:24}, (_,i) => `${i}시`);

function buildDatasets(date, fieldIdx) {
  const comps = getComparisonDates(date);
  const datasets = [];
  const todayRows = getHourlyData(date);

  // 순수주(idx=2)는 별도 현재 시간 기준 사용
  const isNetRev = fieldIdx === 2;
  const curH = isNetRev ? getCurrentNetHour(date) : getCurrentHour(date);

  // ── 실적 라인 ──
  const todayData = todayRows.map((r, h) => {
    if (h > curH) return null;
    const v = r[fieldIdx];
    return (v !== null && v !== undefined) ? v : null;
  });
  datasets.push({
    label: '실적 (' + date + ')',
    data: todayData,
    borderColor: COLORS.today,
    backgroundColor: 'rgba(59,130,246,0.10)',
    borderWidth: 2.5,
    pointRadius: todayData.map((v,h) => v !== null && h === curH ? 5 : 2),
    pointBackgroundColor: todayData.map((v,h) => v !== null && h === curH ? COLORS.today : 'transparent'),
    spanGaps: false,
    tension: 0.3, fill: true,
  });

  // ── 예상마감 추이 (현재시간 이후, 비교일 평균 패턴 × 스케일) ──
  const compDates = [comps.lw, comps.lm, comps.ly].filter(d => d && RAW[d]);
  if (compDates.length > 0 && curH >= 0 && curH < 23) {
    // 비교일별 시간대 평균 (음수도 그대로 사용)
    const compAvg = Array(24).fill(null);
    for (let h = 0; h < 24; h++) {
      const vals = compDates.map(cd => {
        const r = getHourlyData(cd)[h];
        return r !== null ? r[fieldIdx] : null;
      }).filter(v => v !== null);
      if (vals.length) compAvg[h] = vals.reduce((a,b) => a+b, 0) / vals.length;
    }
    // 스케일: 현재시간까지 누적 실적 / 비교일 평균 누적
    const accumReal = todayData.slice(0, curH+1).reduce((a,v) => a + (v||0), 0);
    const accumComp = compAvg.slice(0, curH+1).reduce((a,v) => a + (v||0), 0);
    const scale = accumComp !== 0 ? accumReal / accumComp : 1;

    const forecastData = Array(24).fill(null);
    forecastData[curH] = todayData[curH]; // 현재시점에서 연결
    for (let h = curH + 1; h < 24; h++) {
      if (compAvg[h] !== null) forecastData[h] = Math.round(compAvg[h] * scale);
    }
    datasets.push({
      label: '예상마감 추이',
      data: forecastData,
      borderColor: 'rgba(251,191,36,0.8)',
      backgroundColor: 'transparent',
      borderWidth: 1.5,
      borderDash: [6, 4],
      pointRadius: 0,
      spanGaps: false,
      tension: 0.3, fill: false,
    });
  }

  // ── 비교일 라인 ──
  const compMap  = { lw: comps.lw, lm: comps.lm, ly: comps.ly };
  const colorMap = { lw: COLORS.lw, lm: COLORS.lm, ly: COLORS.ly };
  Object.entries(compMap).forEach(([key, d]) => {
    if (!compareFlags[key] || !d || !RAW[d]) return;
    const rows = getHourlyData(d);
    datasets.push({
      label: LABELS[key] + ' (' + d + ')',
      data: rows.map(r => r !== null ? r[fieldIdx] : null),
      borderColor: colorMap[key],
      backgroundColor: 'transparent',
      borderWidth: 1.5,
      borderDash: [4, 3],
      pointRadius: 0,
      spanGaps: false,
      tension: 0.3, fill: false,
    });
  });

  return datasets;
}


const chartOpts = (formatter) => ({
  responsive: true,
  maintainAspectRatio: false,
  interaction: { mode: 'index', intersect: false },
  plugins: {
    legend: { display: false },
    tooltip: {
      backgroundColor: '#1e293b',
      borderColor: '#2d4160',
      borderWidth: 1,
      titleColor: '#f1f5f9',
      bodyColor: '#94a3b8',
      padding: 10,
      callbacks: {
        label: ctx => {
          const v = ctx.parsed.y;
          if (v === null || v === undefined) return null;
          return ` ${ctx.dataset.label}: ${formatter(v)}`;
        }
      }
    }
  },
  scales: {
    x: {
      ticks: { color: '#475569', font: { size: 10 }, maxTicksLimit: 12 },
      grid: { color: 'rgba(255,255,255,0.04)' },
    },
    y: {
      ticks: { color: '#475569', font: { size: 10 }, callback: v => formatter(v) },
      grid: { color: 'rgba(255,255,255,0.06)' },
    }
  }
});

function renderChart(id, date, fieldIdx, formatter) {
  const el = document.getElementById(id);
  if (!el) return;
  const datasets = buildDatasets(date, fieldIdx);
  if (charts[id]) charts[id].destroy();
  charts[id] = new Chart(el.getContext('2d'), {
    type: 'line',
    data: { labels: HOURS, datasets },
    options: chartOpts(formatter),
  });
  // legend
  const legendEl = document.getElementById('legend-' + id.replace('chart-', ''));
  if (legendEl) {
    legendEl.innerHTML = datasets.map(ds => `
      <div class="legend-item">
        <div class="legend-dot" style="background:${ds.borderColor};opacity:${ds.borderDash ? 0.8 : 1}"></div>
        ${ds.label}
      </div>`).join('');
  }
}


function renderCharts(date) {
  renderChart('chart-orders',  date, 0, v => v.toLocaleString());
  renderChart('chart-revenue', date, 1, v => fmt_rev(v));
  renderChart('chart-netrev',  date, 2, v => fmt_rev(v));
  renderChart('chart-dau',     date, 3, v => v.toLocaleString());
  renderChart('chart-appdau',  date, 4, v => v.toLocaleString());
}

// ═══════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════
function render() {
  const date = selectedDate;
  if (!date) return;
  
  const dayLabel = getWeekdayLabel(date);
  document.getElementById('header-date').textContent = `기준일 ${date} (${dayLabel}) · 실시간 시간대별 현황`;
  document.getElementById('updated-at').textContent = `업데이트 ${new Date().toLocaleTimeString('ko-KR')}`;
  
  renderSummary(date);
  renderKPI(date);
  renderAnomalies(date);
  renderCharts(date);
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
function init() {
  const lastDate = getLastDate();
  selectedDate = lastDate;
  document.getElementById('custom-date').value = lastDate;
  document.getElementById('btn-today').classList.add('active');
  render();
  setInterval(() => {
    document.getElementById('updated-at').textContent = `업데이트 ${new Date().toLocaleTimeString('ko-KR')}`;
  }, 60000);
}

document.addEventListener('DOMContentLoaded', () => {
  fetch('data.json?v=' + Date.now())
    .then(r => r.json())
    .then(json => {
      Object.entries(json).forEach(([date, d]) => {
        if (d.hourly && d.hourly.length && d.hourly.some(r => r[1] > 0)) RAW[date] = d.hourly;
        if (d.tGross || d.revenue) {
          DAILY_TARGETS[date] = {
            event: d.event || '',
            revenue: d.tGross || 0,
            net_revenue: d.tNet || 0
          };
        }
      });
      init();
    })
    .catch(() => init());
});
</script>
